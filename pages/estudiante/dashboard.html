<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estudiante - NOTAS Henry Pittier</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../../css/styles.css" rel="stylesheet">
  <style>
    :root {
      --primary-color: #17a2b8;
      --secondary-color: #6c757d;
    }

    body {
      background-color: #f5f7fa;
    }

    .navbar-custom {
      background: linear-gradient(135deg, var(--primary-color) 0%, #138496 100%);
    }

    .sidebar {
      background-color: #fff;
      border-right: 1px solid #e9ecef;
      position: sticky;
      top: 56px;
      min-height: calc(100vh - 56px);
    }

    .nav-item a {
      border-left: 3px solid transparent;
      padding: 12px 16px;
    }

    .nav-item a:hover,
    .nav-item a.active {
      background-color: #f8f9fa;
      border-left-color: var(--primary-color);
      color: var(--primary-color);
    }

    .main-content {
      padding: 30px;
    }

    .stat-card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      margin-bottom: 20px;
      border-left: 4px solid var(--primary-color);
    }

    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary-color);
    }

    .nota-badge {
      font-size: 1.2rem;
      font-weight: 700;
      padding: 10px 15px;
      border-radius: 8px;
    }

    .nota-excelente { background-color: #d4edda; color: #155724; }
    .nota-buena { background-color: #cfe2ff; color: #084298; }
    .nota-regular { background-color: #fff3cd; color: #664d03; }
    .nota-baja { background-color: #f8d7da; color: #842029; }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="javascript:location.reload()">
        <i class="bi bi-mortarboard-fill"></i> Mi Panel | NOTAS
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="javascript:nav.irAPerfil()">
              <i class="bi bi-person-circle"></i> Mi Perfil
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="javascript:nav.logout()">
              <i class="bi bi-box-arrow-right"></i> Salir
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid" style="margin-top: 56px;">
    <div class="row g-0">
      <!-- SIDEBAR -->
      <div class="col-md-3 d-none d-md-block">
        <div class="sidebar">
          <div class="p-3 border-bottom">
            <div style="display: flex; gap: 10px; align-items: center;">
              <div style="width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary-color), #138496); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700;" id="userInitials">E</div>
              <div>
                <div style="font-weight: 600; font-size: 0.9rem;" id="userName">Estudiante</div>
                <small class="text-muted" id="userEmail">estudiante@ejemplo.com</small>
              </div>
            </div>
          </div>
          <nav class="nav flex-column">
            <a class="nav-item nav-link active" href="javascript:cargarSeccion('inicio')">
              <i class="bi bi-speedometer2"></i> Mis Notas
            </a>
            <a class="nav-item nav-link" href="javascript:cargarSeccion('detalles')">
              <i class="bi bi-file-person"></i> Mis Detalles
            </a>
            <a class="nav-item nav-link" href="javascript:cargarSeccion('historial')">
              <i class="bi bi-clock-history"></i> Historial Académico
            </a>
          </nav>
        </div>
      </div>

      <!-- MAIN CONTENT -->
      <div class="col-md-9">
        <div class="main-content">
          <div id="contentArea">
            <!-- Contenido dinámico -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../js/supabase.js"></script>
  <script src="../../js/services/session.js"></script>
  <script src="../../js/services/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const rol = sessionAPI.obtenerRolPrincipal();
      if (!sessionAPI.estaAutenticado() || rol !== 'Estudiante') {
        window.location.href = '/index.html?access_denied=1';
        return;
      }

      const usuario = sessionAPI.obtenerUsuario();
      document.getElementById('userName').textContent = `${usuario.nombre} ${usuario.apellido}`;
      document.getElementById('userEmail').textContent = usuario.email;

      cargarSeccion('inicio');
    });

    async function cargarSeccion(seccion) {
      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('active');
      });
      if (event?.target) {
        event.target.closest('.nav-item').classList.add('active');
      }

      switch(seccion) {
        case 'inicio':
          await cargarMisNotas();
          break;
        case 'detalles':
          await cargarDetalles();
          break;
        case 'historial':
          await cargarHistorialAcademico();
          break;
      }
    }

    async function cargarMisNotas() {
      const contentArea = document.getElementById('contentArea');
      try {
        const usuario = sessionAPI.obtenerUsuario();
        const periodoActivo = await API.periodos.obtenerActivo();
        const estudiantes = await API.estudiantes.listar();
        const miEstudiante = estudiantes.find(e => e.user_id === usuario.user_id);

        contentArea.innerHTML = `
          <div class="page-header">
            <h2><i class="bi bi-speedometer2"></i> Mis Notas Actuales</h2>
          </div>

          <div class="row">
            <div class="col-md-6 col-lg-4">
              <div class="stat-card">
                <div class="stat-number">0.0</div>
                <div class="stat-label">Promedio General</div>
              </div>
            </div>
            <div class="col-md-6 col-lg-4">
              <div class="stat-card">
                <div class="stat-number">0</div>
                <div class="stat-label">Materias Cursando</div>
              </div>
            </div>
            <div class="col-md-6 col-lg-4">
              <div class="stat-card">
                <div class="stat-number">${periodoActivo?.nombre || 'N/A'}</div>
                <div class="stat-label">Período Actual</div>
              </div>
            </div>
          </div>

          <div class="card mt-4">
            <div class="card-header" style="background: linear-gradient(135deg, var(--primary-color), #138496); color: white; border: none;">
              <h5 class="mb-0"><i class="bi bi-list-check"></i> Notas del Lapso Actual</h5>
            </div>
            <div class="card-body">
              <div class="table-responsive">
                <table class="table table-hover mb-0">
                  <thead style="background-color: #f8f9fa;">
                    <tr>
                      <th>Materia</th>
                      <th>Docente</th>
                      <th>Nota</th>
                      <th>Detalles</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td colspan="4" class="text-center text-muted">No hay notas disponibles para el período actual</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        `;

      } catch(error) {
        console.error('Error:', error);
        contentArea.innerHTML = `<div class="alert alert-danger">Error: ${error.message}</div>`;
      }
    }

    async function cargarDetalles() {
      const contentArea = document.getElementById('contentArea');
      try {
        const usuario = sessionAPI.obtenerUsuario();
        const estudiantes = await API.estudiantes.listar();
        const miEstudiante = estudiantes.find(e => e.user_id === usuario.user_id);

        contentArea.innerHTML = `
          <div class="page-header">
            <h2><i class="bi bi-file-person"></i> Mis Detalles Académicos</h2>
          </div>

          <div class="card">
            <div class="card-header" style="background: linear-gradient(135deg, var(--primary-color), #138496); color: white; border: none;">
              <h5 class="mb-0"><i class="bi bi-person"></i> Información Personal</h5>
            </div>
            <div class="card-body">
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label text-muted">Nombre Completo</label>
                  <p class="fw-bold">${usuario.nombre} ${usuario.apellido}</p>
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label text-muted">Cédula</label>
                  <p class="fw-bold">${usuario.cedula || 'No especificada'}</p>
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label text-muted">Email</label>
                  <p class="fw-bold">${usuario.email}</p>
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label text-muted">Sección</label>
                  <p class="fw-bold">${miEstudiante?.seccion_nombre || 'No asignada'}</p>
                </div>
              </div>
            </div>
          </div>
        `;

      } catch(error) {
        console.error('Error:', error);
        contentArea.innerHTML = `<div class="alert alert-danger">Error: ${error.message}</div>`;
      }
    }

    async function cargarHistorialAcademico() {
      const contentArea = document.getElementById('contentArea');
      contentArea.innerHTML = `
        <div class="page-header">
          <h2><i class="bi bi-clock-history"></i> Historial Académico</h2>
        </div>

        <div class="alert alert-info">
          <i class="bi bi-info-circle"></i> Aquí aparecerán tus notas de períodos anteriores
        </div>
      `;
    }
  </script>
</body>
</html>
